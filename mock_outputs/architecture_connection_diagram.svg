<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980">
  <rect width="1500" height="980" fill="#f8f9fa"/>
  <text x="750" y="50" text-anchor="middle" font-family="Arial" font-size="28" font-weight="bold" fill="#212529">
    3-Plant Demo Architecture and Connection Diagram
  </text>

  <rect x="60" y="110" width="500" height="800" rx="18" fill="#eef6ff" stroke="#5b8def" stroke-width="3"/>
  <text x="310" y="150" text-anchor="middle" font-family="Arial" font-size="26" font-weight="bold" fill="#1d3557">Control and Processing</text>

  <rect x="120" y="190" width="360" height="120" rx="16" fill="#dbeafe" stroke="#457b9d" stroke-width="3"/>
  <text x="300" y="232" text-anchor="middle" font-family="Arial" font-size="24" font-weight="bold" fill="#1d3557">Raspberry Pi 4B</text>
  <text x="300" y="264" text-anchor="middle" font-family="Arial" font-size="18" fill="#1d3557">runs phases 1 to 7</text>

  <rect x="120" y="360" width="170" height="90" rx="14" fill="#cfe8ff" stroke="#457b9d" stroke-width="3"/>
  <text x="205" y="413" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold" fill="#1d3557">Pi Camera</text>

  <rect x="310" y="360" width="170" height="90" rx="14" fill="#ffe8cc" stroke="#bc6c25" stroke-width="3"/>
  <text x="395" y="400" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#6b3f1d">GPIO</text>
  <text x="395" y="425" text-anchor="middle" font-family="Arial" font-size="16" fill="#6b3f1d">17, 27, 22, 23</text>

  <rect x="120" y="500" width="360" height="150" rx="16" fill="#ffffff" stroke="#6c757d" stroke-width="2"/>
  <text x="300" y="538" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold" fill="#212529">Software pipeline</text>
  <text x="145" y="575" font-family="Arial" font-size="18" fill="#212529">Phase 1: capture and select leaves</text>
  <text x="145" y="603" font-family="Arial" font-size="18" fill="#212529">Phase 2: disease segmentation</text>
  <text x="145" y="631" font-family="Arial" font-size="18" fill="#212529">Phase 3 to 6: logic, calculation, selection</text>

  <rect x="120" y="710" width="360" height="140" rx="16" fill="#ffffff" stroke="#6c757d" stroke-width="2"/>
  <text x="300" y="748" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold" fill="#212529">Outputs</text>
  <text x="145" y="785" font-family="Arial" font-size="18" fill="#212529">- belt move command</text>
  <text x="145" y="813" font-family="Arial" font-size="18" fill="#212529">- spray relay command</text>
  <text x="145" y="841" font-family="Arial" font-size="18" fill="#212529">- plant-level decision</text>

  <rect x="620" y="110" width="360" height="800" rx="18" fill="#fff7e6" stroke="#e09f3e" stroke-width="3"/>
  <text x="800" y="150" text-anchor="middle" font-family="Arial" font-size="26" font-weight="bold" fill="#7f4f24">Power and Drivers</text>

  <rect x="690" y="200" width="220" height="100" rx="16" fill="#f4cccc" stroke="#b85450" stroke-width="3"/>
  <text x="800" y="240" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold" fill="#7a1f1f">12V Power Supply</text>
  <text x="800" y="270" text-anchor="middle" font-family="Arial" font-size="18" fill="#7a1f1f">motor + pump side</text>

  <rect x="690" y="360" width="220" height="110" rx="16" fill="#ffe6cc" stroke="#bc6c25" stroke-width="3"/>
  <text x="800" y="405" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold" fill="#6b3f1d">Motor Driver</text>
  <text x="800" y="433" text-anchor="middle" font-family="Arial" font-size="18" fill="#6b3f1d">TB6612FNG or L298N</text>

  <rect x="690" y="530" width="220" height="110" rx="16" fill="#fde2e4" stroke="#c1121f" stroke-width="3"/>
  <text x="800" y="575" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold" fill="#780000">5V Relay Module</text>
  <text x="800" y="603" text-anchor="middle" font-family="Arial" font-size="18" fill="#780000">controls pump</text>

  <rect x="690" y="700" width="220" height="110" rx="16" fill="#f1f3f5" stroke="#6c757d" stroke-width="3"/>
  <text x="800" y="745" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold" fill="#212529">Common Ground</text>
  <text x="800" y="773" text-anchor="middle" font-family="Arial" font-size="18" fill="#212529">Pi GND linked to 12V GND</text>

  <rect x="1040" y="110" width="380" height="800" rx="18" fill="#eefbf0" stroke="#52b788" stroke-width="3"/>
  <text x="1230" y="150" text-anchor="middle" font-family="Arial" font-size="26" font-weight="bold" fill="#1b4332">Actuators and Plant Area</text>

  <rect x="1110" y="210" width="240" height="100" rx="16" fill="#d8f3dc" stroke="#40916c" stroke-width="3"/>
  <text x="1230" y="250" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold" fill="#1b4332">12V Gear Motor</text>
  <text x="1230" y="278" text-anchor="middle" font-family="Arial" font-size="18" fill="#1b4332">moves carriage on rail</text>

  <rect x="1110" y="360" width="240" height="100" rx="16" fill="#f4cccc" stroke="#b85450" stroke-width="3"/>
  <text x="1230" y="400" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold" fill="#7a1f1f">12V Mini Pump</text>
  <text x="1230" y="428" text-anchor="middle" font-family="Arial" font-size="18" fill="#7a1f1f">creates spray pressure</text>

  <rect x="1110" y="510" width="240" height="100" rx="16" fill="#d9ead3" stroke="#6aa84f" stroke-width="3"/>
  <text x="1230" y="550" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold" fill="#274e13">Tank + Tube + Nozzle</text>
  <text x="1230" y="578" text-anchor="middle" font-family="Arial" font-size="18" fill="#274e13">sprays current plant</text>

  <rect x="1080" y="680" width="300" height="150" rx="18" fill="#ccd5ae" stroke="#606c38" stroke-width="3"/>
  <text x="1230" y="725" text-anchor="middle" font-family="Arial" font-size="24" font-weight="bold" fill="#283618">3 Tomato Plants</text>
  <text x="1230" y="760" text-anchor="middle" font-family="Arial" font-size="18" fill="#283618">Plant 1  ->  Plant 2  ->  Plant 3</text>
  <text x="1230" y="792" text-anchor="middle" font-family="Arial" font-size="18" fill="#283618">camera and nozzle stop above each plant</text>

  <line x1="300" y1="310" x2="205" y2="360" stroke="#457b9d" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <line x1="300" y1="310" x2="395" y2="360" stroke="#bc6c25" stroke-width="4" marker-end="url(#arrowOrange)"/>
  <line x1="480" y1="405" x2="690" y2="415" stroke="#bc6c25" stroke-width="4" marker-end="url(#arrowOrange)"/>
  <line x1="480" y1="405" x2="690" y2="585" stroke="#c1121f" stroke-width="4" marker-end="url(#arrowRed)"/>

  <line x1="910" y1="415" x2="1110" y2="260" stroke="#6b3f1d" stroke-width="4" marker-end="url(#arrowGreen)"/>
  <line x1="910" y1="585" x2="1110" y2="410" stroke="#780000" stroke-width="4" marker-end="url(#arrowRed)"/>
  <line x1="1230" y1="460" x2="1230" y2="510" stroke="#7a1f1f" stroke-width="5" marker-end="url(#arrowRed)"/>

  <line x1="800" y1="300" x2="800" y2="360" stroke="#b85450" stroke-width="5" marker-end="url(#arrowRed)"/>
  <line x1="800" y1="300" x2="800" y2="530" stroke="#b85450" stroke-width="5" marker-end="url(#arrowRed)"/>
  <line x1="300" y1="250" x2="690" y2="755" stroke="#495057" stroke-width="3" stroke-dasharray="8 8"/>
  <text x="410" y="520" font-family="Arial" font-size="16" fill="#495057">common ground connection</text>

  <rect x="540" y="20" width="420" height="55" rx="12" fill="#ffffff" stroke="#adb5bd" stroke-width="1.5"/>
  <text x="750" y="55" text-anchor="middle" font-family="Arial" font-size="18" fill="#212529">CSI camera input, GPIO control lines, 12V actuator side, and shared ground</text>

  <defs>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#457b9d"/>
    </marker>
    <marker id="arrowOrange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#bc6c25"/>
    </marker>
    <marker id="arrowRed" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#b85450"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#40916c"/>
    </marker>
  </defs>
</svg>
