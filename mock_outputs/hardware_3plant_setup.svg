<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <rect width="1400" height="900" fill="#f7f4ea"/>
  <text x="700" y="50" text-anchor="middle" font-family="Arial" font-size="28" font-weight="bold" fill="#2c2c2c">
    3-Plant Tomato Demo Hardware Layout
  </text>

  <rect x="120" y="110" width="1160" height="30" rx="8" fill="#8e9aaf"/>
  <text x="700" y="102" text-anchor="middle" font-family="Arial" font-size="18" fill="#33415c">Overhead rail / guided bar</text>

  <rect x="250" y="140" width="180" height="90" rx="14" fill="#d8e2dc" stroke="#52796f" stroke-width="3"/>
  <text x="340" y="180" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold" fill="#2f3e46">Moving</text>
  <text x="340" y="208" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold" fill="#2f3e46">Carriage</text>

  <rect x="275" y="250" width="90" height="60" rx="10" fill="#bde0fe" stroke="#457b9d" stroke-width="3"/>
  <text x="320" y="288" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#1d3557">Pi Cam</text>

  <rect x="385" y="250" width="70" height="60" rx="10" fill="#ffd6a5" stroke="#bc6c25" stroke-width="3"/>
  <text x="420" y="286" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#6b3f1d">Nozzle</text>

  <line x1="320" y1="310" x2="320" y2="400" stroke="#1d3557" stroke-width="4" stroke-dasharray="8 8"/>
  <line x1="420" y1="310" x2="420" y2="400" stroke="#bc6c25" stroke-width="4" stroke-dasharray="8 8"/>

  <text x="540" y="200" font-family="Arial" font-size="20" fill="#2c2c2c">Carriage moves above each plant</text>
  <path d="M520 220 C600 220, 700 220, 810 220" fill="none" stroke="#2a9d8f" stroke-width="5" marker-end="url(#arrow)"/>

  <rect x="1080" y="170" width="140" height="90" rx="12" fill="#f4cccc" stroke="#b85450" stroke-width="3"/>
  <text x="1150" y="205" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="#7a1f1f">12V Pump</text>
  <text x="1150" y="232" text-anchor="middle" font-family="Arial" font-size="16" fill="#7a1f1f">fixed on frame</text>

  <rect x="1050" y="300" width="200" height="120" rx="14" fill="#d9ead3" stroke="#6aa84f" stroke-width="3"/>
  <text x="1150" y="348" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold" fill="#274e13">Tank / Bottle</text>
  <text x="1150" y="378" text-anchor="middle" font-family="Arial" font-size="18" fill="#274e13">500 mL - 1 L</text>

  <path d="M1050 360 C930 360, 780 300, 455 280" fill="none" stroke="#4ea8de" stroke-width="6"/>
  <text x="820" y="330" font-family="Arial" font-size="18" fill="#1d3557">tube to nozzle</text>

  <rect x="100" y="650" width="280" height="120" rx="18" fill="#ccd5ae" stroke="#606c38" stroke-width="3"/>
  <ellipse cx="240" cy="650" rx="95" ry="32" fill="#a3b18a"/>
  <text x="240" y="706" text-anchor="middle" font-family="Arial" font-size="26" font-weight="bold" fill="#283618">Plant 1</text>

  <rect x="560" y="650" width="280" height="120" rx="18" fill="#ccd5ae" stroke="#606c38" stroke-width="3"/>
  <ellipse cx="700" cy="650" rx="95" ry="32" fill="#a3b18a"/>
  <text x="700" y="706" text-anchor="middle" font-family="Arial" font-size="26" font-weight="bold" fill="#283618">Plant 2</text>

  <rect x="1020" y="650" width="280" height="120" rx="18" fill="#ccd5ae" stroke="#606c38" stroke-width="3"/>
  <ellipse cx="1160" cy="650" rx="95" ry="32" fill="#a3b18a"/>
  <text x="1160" y="706" text-anchor="middle" font-family="Arial" font-size="26" font-weight="bold" fill="#283618">Plant 3</text>

  <rect x="70" y="790" width="1260" height="35" rx="10" fill="#7f5539"/>
  <text x="700" y="853" text-anchor="middle" font-family="Arial" font-size="18" fill="#5c3d2e">Frame / table / plant support area</text>

  <line x1="320" y1="400" x2="240" y2="620" stroke="#1d3557" stroke-width="3" stroke-dasharray="7 7"/>
  <line x1="420" y1="400" x2="240" y2="620" stroke="#bc6c25" stroke-width="3" stroke-dasharray="7 7"/>
  <text x="215" y="430" font-family="Arial" font-size="18" fill="#2c2c2c">camera and nozzle target the current plant</text>

  <rect x="470" y="460" width="410" height="120" rx="18" fill="#ffffff" stroke="#6c757d" stroke-width="2"/>
  <text x="675" y="495" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold" fill="#2c2c2c">Physical idea</text>
  <text x="500" y="528" font-family="Arial" font-size="18" fill="#2c2c2c">- One rail above 3 tomato plants</text>
  <text x="500" y="556" font-family="Arial" font-size="18" fill="#2c2c2c">- Camera and nozzle mounted on one small moving carriage</text>
  <text x="500" y="584" font-family="Arial" font-size="18" fill="#2c2c2c">- Pump and tank kept fixed to reduce moving weight</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#2a9d8f"/>
    </marker>
  </defs>
</svg>
