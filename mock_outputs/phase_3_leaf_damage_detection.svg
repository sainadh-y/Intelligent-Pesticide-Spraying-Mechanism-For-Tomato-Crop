<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <rect width="1200" height="760" fill="#fbf7f1"/>
  <rect x="40" y="30" width="1120" height="700" rx="24" fill="#ffffff" stroke="#6b4a1e" stroke-width="4"/>
  <text x="70" y="90" font-family="Arial" font-size="34" font-weight="700" fill="#6b4a1e">Phase 3 - Leaf Damage Detection</text>
  <text x="70" y="130" font-family="Arial" font-size="20" fill="#7a674b">Mock output: visible damage estimated on selected tomato leaf images.</text>

  <rect x="70" y="180" width="1060" height="80" rx="14" fill="#f6ede1" stroke="#d4b48a" stroke-width="2"/>
  <text x="95" y="225" font-family="Arial" font-size="24" font-weight="700" fill="#6b4a1e">Selected leaves processed: 6</text>
  <text x="520" y="225" font-family="Arial" font-size="24" fill="#6b4a1e">Method shown: visible damage percentage</text>

  <rect x="70" y="310" width="510" height="320" rx="16" fill="#fffaf4" stroke="#e6d7c3" stroke-width="2"/>
  <text x="95" y="350" font-family="Arial" font-size="26" font-weight="700" fill="#6b4a1e">Per-Leaf Damage</text>
  <text x="95" y="395" font-family="Arial" font-size="20" fill="#2f2f2f">leaf_1.jpg   12.34%</text>
  <text x="95" y="430" font-family="Arial" font-size="20" fill="#2f2f2f">leaf_2.jpg   19.00%</text>
  <text x="95" y="465" font-family="Arial" font-size="20" fill="#2f2f2f">leaf_3.jpg   15.20%</text>
  <text x="95" y="500" font-family="Arial" font-size="20" fill="#2f2f2f">leaf_4.jpg   18.10%</text>
  <text x="95" y="535" font-family="Arial" font-size="20" fill="#2f2f2f">leaf_5.jpg   16.70%</text>
  <text x="95" y="570" font-family="Arial" font-size="20" fill="#2f2f2f">leaf_6.jpg   14.90%</text>

  <rect x="620" y="310" width="510" height="320" rx="16" fill="#fffaf4" stroke="#e6d7c3" stroke-width="2"/>
  <text x="645" y="350" font-family="Arial" font-size="26" font-weight="700" fill="#6b4a1e">Plant Output</text>
  <text x="645" y="410" font-family="Arial" font-size="26" font-weight="700" fill="#2f2f2f">average_leaf_damage_percentage = 0.16</text>
  <text x="645" y="470" font-family="Arial" font-size="20" fill="#2f2f2f">Meaning: average visible damage across selected leaves = 16%</text>
  <text x="645" y="530" font-family="Arial" font-size="20" fill="#6b4a1e">Passed into phase 4 as damage component.</text>
</svg>
