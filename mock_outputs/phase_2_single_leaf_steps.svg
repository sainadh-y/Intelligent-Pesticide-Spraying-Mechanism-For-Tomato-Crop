<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1800" viewBox="0 0 1600 1800">
  <rect width="1600" height="1800" fill="#f5f7fb"/>
  <text x="60" y="70" font-family="Arial" font-size="38" font-weight="700" fill="#1f3b66">Phase 2 - One Leaf Through the Full Algorithm</text>
  <text x="60" y="110" font-family="Arial" font-size="20" fill="#4d5f7a">Mock visual showing how one selected tomato leaf is processed from raw image to plant-level contribution.</text>

  <!-- Helper defs -->
  <defs>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5dbb63"/>
      <stop offset="100%" stop-color="#2f7f3c"/>
    </linearGradient>
    <linearGradient id="leafGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#75ca72"/>
      <stop offset="100%" stop-color="#2f8d47"/>
    </linearGradient>
    <style>
      .card { fill:#ffffff; stroke:#cfd8e6; stroke-width:2; rx:18; }
      .title { font-family:Arial; font-size:24px; font-weight:700; fill:#1f3b66; }
      .desc { font-family:Arial; font-size:18px; fill:#2f2f2f; }
      .small { font-family:Arial; font-size:16px; fill:#4b5565; }
    </style>
  </defs>

  <!-- grid cards -->
  <!-- row 1 -->
  <rect class="card" x="50" y="150" width="470" height="300" rx="18"/>
  <rect class="card" x="565" y="150" width="470" height="300" rx="18"/>
  <rect class="card" x="1080" y="150" width="470" height="300" rx="18"/>

  <!-- row 2 -->
  <rect class="card" x="50" y="490" width="470" height="300" rx="18"/>
  <rect class="card" x="565" y="490" width="470" height="300" rx="18"/>
  <rect class="card" x="1080" y="490" width="470" height="300" rx="18"/>

  <!-- row 3 -->
  <rect class="card" x="50" y="830" width="470" height="300" rx="18"/>
  <rect class="card" x="565" y="830" width="470" height="300" rx="18"/>
  <rect class="card" x="1080" y="830" width="470" height="300" rx="18"/>

  <!-- row 4 -->
  <rect class="card" x="50" y="1170" width="730" height="300" rx="18"/>
  <rect class="card" x="820" y="1170" width="730" height="300" rx="18"/>

  <!-- Step 1 -->
  <text x="75" y="190" class="title">1. Selected Leaf Input</text>
  <text x="75" y="225" class="small">One clear leaf chosen from phase 1.</text>
  <rect x="95" y="245" width="180" height="150" fill="#d9dfd4" stroke="#9aa88d"/>
  <path d="M185 375 C120 330, 110 260, 190 250 C260 260, 275 330, 185 375 Z" fill="url(#leafGrad)"/>
  <ellipse cx="185" cy="312" rx="7" ry="58" fill="#c8e79b"/>
  <circle cx="160" cy="295" r="18" fill="#8c5936"/>
  <circle cx="214" cy="330" r="14" fill="#8c5936"/>
  <text x="300" y="285" class="desc">Input file:</text>
  <text x="300" y="320" class="desc">leaf_1.jpg</text>
  <text x="300" y="360" class="desc">Clear tomato leaf</text>

  <!-- Step 2 -->
  <text x="590" y="190" class="title">2. Preprocess Image</text>
  <text x="590" y="225" class="small">Resize, normalize, and standardize.</text>
  <rect x="610" y="245" width="180" height="150" fill="#e8edf7" stroke="#95a8ca"/>
  <path d="M700 375 C635 330, 625 260, 705 250 C775 260, 790 330, 700 375 Z" fill="url(#leafGrad2)"/>
  <ellipse cx="700" cy="312" rx="6" ry="58" fill="#d6f0ac"/>
  <circle cx="675" cy="295" r="16" fill="#7c4d31"/>
  <circle cx="729" cy="330" r="13" fill="#7c4d31"/>
  <text x="815" y="285" class="desc">Target size:</text>
  <text x="815" y="320" class="desc">256 x 256</text>
  <text x="815" y="360" class="desc">Pixel values normalized</text>

  <!-- Step 3 -->
  <text x="1105" y="190" class="title">3. Run U-Net Model</text>
  <text x="1105" y="225" class="small">Forward pass through segmentation network.</text>
  <rect x="1125" y="255" width="140" height="120" fill="#f1f4fb" stroke="#9ab1d8"/>
  <rect x="1140" y="270" width="32" height="90" fill="#bfd1f2"/>
  <rect x="1182" y="255" width="32" height="120" fill="#9db8ea"/>
  <rect x="1224" y="240" width="32" height="150" fill="#7ea0de"/>
  <line x1="1268" y1="315" x2="1325" y2="315" stroke="#4a6fb3" stroke-width="4"/>
  <rect x="1335" y="275" width="90" height="80" fill="#dbe6fb" stroke="#8ca7d8"/>
  <text x="1450" y="315" class="desc">Disease logits</text>

  <!-- Step 4 -->
  <text x="75" y="530" class="title">4. Predict Pixel-wise Disease Map</text>
  <text x="75" y="565" class="small">Each leaf pixel gets a class label.</text>
  <rect x="95" y="585" width="200" height="165" fill="#eef2fb" stroke="#a6b6d3"/>
  <path d="M195 718 C130 672, 120 602, 200 592 C270 602, 285 672, 195 718 Z" fill="#53b65e"/>
  <ellipse cx="195" cy="655" rx="7" ry="58" fill="#d8f5ac"/>
  <circle cx="170" cy="635" r="18" fill="#d94b46"/>
  <circle cx="220" cy="675" r="14" fill="#e6b422"/>
  <circle cx="205" cy="610" r="10" fill="#8b5cf6"/>
  <text x="320" y="620" class="desc">Red = early blight</text>
  <text x="320" y="655" class="desc">Yellow = late blight</text>
  <text x="320" y="690" class="desc">Purple = septoria</text>

  <!-- Step 5 -->
  <text x="590" y="530" class="title">5. Derive Visible Leaf Mask</text>
  <text x="590" y="565" class="small">Only visible leaf area is used as denominator.</text>
  <rect x="610" y="585" width="200" height="165" fill="#101010" stroke="#6b7280"/>
  <path d="M710 718 C645 672, 635 602, 715 592 C785 602, 800 672, 710 718 Z" fill="#ffffff"/>
  <ellipse cx="710" cy="655" rx="7" ry="58" fill="#ffffff"/>
  <text x="840" y="635" class="desc">visible_leaf_pixels = 28,000</text>
  <text x="840" y="675" class="desc">Background excluded</text>

  <!-- Step 6 -->
  <text x="1105" y="530" class="title">6. Calculate Disease Percentages</text>
  <text x="1105" y="565" class="small">Percentage = disease_pixels / visible_leaf_pixels</text>
  <text x="1125" y="625" class="desc">early_blight = 6,720 / 28,000 = 0.24</text>
  <text x="1125" y="665" class="desc">late_blight = 4,480 / 28,000 = 0.16</text>
  <text x="1125" y="705" class="desc">septoria = 1,960 / 28,000 = 0.07</text>

  <!-- Step 7 -->
  <text x="75" y="870" class="title">7. Derive Healthy Percentage</text>
  <text x="75" y="905" class="small">Healthy area = remaining visible leaf area.</text>
  <text x="95" y="970" class="desc">known disease total = 0.24 + 0.16 + 0.07 + 0.02 + 0.03 + 0.01 = 0.53</text>
  <text x="95" y="1010" class="desc">healthy = 1.00 - 0.53 = 0.47</text>
  <text x="95" y="1070" class="desc">Leaf result:</text>
  <text x="95" y="1105" class="desc">late_blight 0.16, early_blight 0.24, septoria 0.07, healthy 0.47, ...</text>

  <!-- Step 8 -->
  <text x="590" y="870" class="title">8. Repeat for All Selected Leaves</text>
  <text x="590" y="905" class="small">The same process runs for each of the 5-10 selected leaves.</text>
  <text x="610" y="970" class="desc">leaf_1 -> early_blight 0.24</text>
  <text x="610" y="1005" class="desc">leaf_2 -> early_blight 0.20</text>
  <text x="610" y="1040" class="desc">leaf_3 -> early_blight 0.27</text>
  <text x="610" y="1075" class="desc">leaf_4 -> early_blight 0.25</text>
  <text x="610" y="1110" class="desc">leaf_5 -> early_blight 0.23</text>

  <!-- Step 9 -->
  <text x="1105" y="870" class="title">9. Average Per-Leaf Percentages</text>
  <text x="1105" y="905" class="small">Average disease values across all selected leaves.</text>
  <text x="1125" y="970" class="desc">early_blight = avg(0.24, 0.20, 0.27, 0.25, 0.23, ...) = 0.24</text>
  <text x="1125" y="1010" class="desc">late_blight = avg(...) = 0.16</text>
  <text x="1125" y="1050" class="desc">septoria = avg(...) = 0.07</text>
  <text x="1125" y="1090" class="desc">healthy = avg(...) = 0.47</text>

  <!-- Step 10 -->
  <text x="75" y="1210" class="title">10. Final Plant-Level Disease Output</text>
  <text x="75" y="1245" class="small">This aggregated result is passed into phase 4.</text>
  <rect x="95" y="1280" width="1410" height="120" rx="16" fill="#eaf0fb" stroke="#8ca7d8" stroke-width="2"/>
  <text x="120" y="1335" font-family="Arial" font-size="24" font-weight="700" fill="#1f3b66">phase_2_output.disease_percentages</text>
  <text x="120" y="1375" font-family="Arial" font-size="22" fill="#2f2f2f">late_blight = 0.16   early_blight = 0.24   septoria = 0.07   bacterial_leaf_spot = 0.02</text>
  <text x="120" y="1410" font-family="Arial" font-size="22" fill="#2f2f2f">leaf_mold = 0.03   yellow_leaf_curl_virus = 0.01   mosaic_virus = 0.00   healthy = 0.47</text>

  <!-- Formula summary -->
  <rect x="820" y="1170" width="730" height="300" rx="18" fill="#ffffff" stroke="#cfd8e6" stroke-width="2"/>
  <text x="845" y="1210" class="title">Core Formula Used in the Leaf-Level Step</text>
  <text x="845" y="1270" class="desc">disease_percentage = disease_pixels / visible_leaf_pixels</text>
  <text x="845" y="1320" class="desc">healthy_percentage = 1 - sum(all disease percentages)</text>
  <text x="845" y="1370" class="desc">plant_disease_percentage = average(per_leaf_disease_percentages)</text>
  <text x="845" y="1430" class="small">This visual is a mock explanation image, not a real model output.</text>
</svg>
